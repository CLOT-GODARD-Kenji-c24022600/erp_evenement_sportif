server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/html/src/public;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # URLs propres → index.php?page=xxx (garde les autres query params)
    location ~ ^/(dashboard|staff|projets|annuaire|profil|utilisateurs|nouvel_event|recherche|login|inscription|logout|forgot_password|reset_password|gerer_event|projet_detail|ajax_search|change_lang)(/.*)?$ {
        rewrite ^/([^/?]+)(.*)$ /index.php?page=$1 last;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}