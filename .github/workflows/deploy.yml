name: Deploy to Alwaysdata

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Récupération du code
      uses: actions/checkout@v4

    - name: Déploiement FTPS (Contournement sécurité)
      env:
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -c "
        set ftp:ssl-force true
        set ftp:ssl-protect-data true
        set ssl:verify-certificate no
        open -u ${{ secrets.FTP_USERNAME }},\"$FTP_PASSWORD\" ${{ secrets.FTP_SERVER }}
        mirror -R --verbose --exclude-glob .git* --exclude-glob node_modules/ --exclude-glob docker-compose.yml --exclude-glob Dockerfile ./ /www/
        "